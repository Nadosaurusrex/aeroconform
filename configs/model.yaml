# AeroConform Model Architecture Configuration
model:
  d_model: 256
  n_heads: 8
  n_layers: 6
  d_ff: 1024
  dropout: 0.1
  max_patches: 64
  input_dim: 6
  patch_len: 8
  n_components: 5

graph:
  hidden_channels: 128
  heads: 4
  n_layers: 2
  edge_dim: 4
  proximity_threshold_nm: 50.0
  altitude_band_ft: 5000.0
  max_edges_per_node: 10

conformal:
  alpha: 0.01
  cal_window: 500
  adapt_lr: 0.01
